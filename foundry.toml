[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
gas_reports = ["KeyRegistry", "MessageRegistry"]

[rpc_endpoints]
linea_sepolia = "https://rpc.sepolia.linea.build"
linea_mainnet = "https://rpc.linea.build"

[etherscan]
linea_sepolia = { key = "${LINEASCAN_API_KEY}", url = "https://api-explorer.sepolia.linea.build/api" }
linea_mainnet = { key = "${LINEASCAN_API_KEY}", url = "https://api-explorer.linea.build/api" }
